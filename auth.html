<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柒柒的博客 - 登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #06060e;
      --bg-card: rgba(255, 255, 255, 0.03);
      --border: rgba(0, 229, 255, 0.12);
      --accent: #00e5ff;
      --accent2: #b44aff;
      --text: #d4d4dc;
      --text-dim: #777;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(0, 229, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(180, 74, 255, 0.04) 0%, transparent 50%);
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(6, 6, 14, 0.7);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: 2px;
    }

    .logo-dot { color: var(--accent); }

    .nav-links { display: flex; gap: 28px; }

    .nav-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.25s;
      position: relative;
    }

    .nav-links a:hover,
    .nav-links a.active { color: #fff; }

    .nav-links a.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    /* 主布局 */
    .auth-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
    }

    .auth-container {
      display: flex;
      width: 100%;
      max-width: 880px;
      min-height: 480px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(40px);
    }

    /* 左侧品牌区 */
    .auth-brand {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
      background: rgba(0, 229, 255, 0.03);
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 229, 255, 0.08) 0%, transparent 60%);
      animation: brandGlow 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes brandGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .auth-logo {
      font-size: 3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 4px;
      position: relative;
      z-index: 1;
    }

    .auth-logo-dot {
      color: var(--accent);
    }

    .auth-slogan {
      font-size: 1.05rem;
      color: var(--text-dim);
      margin-top: 16px;
      position: relative;
      z-index: 1;
      letter-spacing: 0.08em;
    }

    .auth-decor {
      margin-top: 32px;
      position: relative;
      z-index: 1;
      display: flex;
      gap: 16px;
      opacity: 0.3;
    }

    .auth-decor span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: decorFloat 3s ease-in-out infinite;
    }

    .auth-decor span:nth-child(2) { animation-delay: 0.4s; background: var(--accent2); }
    .auth-decor span:nth-child(3) { animation-delay: 0.8s; }

    @keyframes decorFloat {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-12px); opacity: 1; }
    }

    /* 右侧表单区 */
    .auth-form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 40px;
    }

    .auth-card {
      width: 100%;
      max-width: 360px;
      background: rgba(22, 22, 38, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 32px;
    }

    .auth-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    #nicknameGroup {
      display: none;
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      margin-top: 8px;
    }

    .auth-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 229, 255, 0.25);
    }

    .auth-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    .auth-switch a:hover {
      color: #fff;
    }

    .auth-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: #f87171;
      margin-bottom: 16px;
      display: none;
    }

    .auth-error.show { display: block; }

    /* 响应式 */
    @media (max-width: 640px) {
      .auth-container {
        flex-direction: column;
        min-height: auto;
      }

      .auth-brand {
        padding: 32px 24px;
      }

      .auth-logo {
        font-size: 2.2rem;
      }

      .auth-slogan {
        font-size: 0.9rem;
      }

      .auth-decor {
        margin-top: 20px;
      }

      .auth-form-area {
        padding: 24px 20px 40px;
      }

      .auth-card {
        padding: 28px 24px;
      }

      .nav-links { gap: 16px; }
      .nav-links a { font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">柒柒<span class="logo-dot">.</span></a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="blog.html">博客</a>
        <a href="about.html">关于</a>
        <a href="thanks.html">致谢</a>
        <a href="friends.html">友链</a>
        <a href="write.html" class="active">写文章</a>
      </div>
    </div>
  </nav>

  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-brand">
        <div class="auth-logo">柒柒<span class="auth-logo-dot">.</span></div>
        <p class="auth-slogan">写下你的故事</p>
        <div class="auth-decor">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="auth-form-area">
        <div class="auth-card">
          <h2 class="auth-title" id="authTitle">登录</h2>
          <div class="auth-error" id="authError"></div>
          <form id="authForm" onsubmit="return false;">
            <div class="form-group" id="nicknameGroup">
              <label for="nickname">昵称</label>
              <input type="text" id="nickname" placeholder="你想被怎么称呼？" autocomplete="nickname">
            </div>
            <div class="form-group">
              <label for="email">邮箱</label>
              <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
              <label for="password">密码</label>
              <input type="password" id="password" placeholder="至少 6 位" required minlength="6" autocomplete="current-password">
            </div>
            <button type="submit" class="auth-btn" id="authBtn">登录</button>
          </form>
          <p class="auth-switch" id="authSwitch">
            还没有账号？<a id="switchLink" href="javascript:void(0)">去注册</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let isRegister = false;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const el = {
      title: document.getElementById('authTitle'),
      btn: document.getElementById('authBtn'),
      switchText: document.getElementById('authSwitch'),
      switchLink: document.getElementById('switchLink'),
      nicknameGroup: document.getElementById('nicknameGroup'),
      nickname: document.getElementById('nickname'),
      email: document.getElementById('email'),
      password: document.getElementById('password'),
      error: document.getElementById('authError'),
      form: document.getElementById('authForm')
    };

    function toggleMode() {
      isRegister = !isRegister;
      if (isRegister) {
        el.title.textContent = '注册';
        el.btn.textContent = '注册';
        el.switchText.innerHTML = '已有账号？<a id="switchLink" href="javascript:void(0)">去登录</a>';
        el.nicknameGroup.style.display = 'block';
        el.nickname.required = true;
        document.getElementById('switchLink').addEventListener('click', toggleMode);
      } else {
        el.title.textContent = '登录';
        el.btn.textContent = '登录';
        el.switchText.innerHTML = '还没有账号？<a id="switchLink" href="javascript:void(0)">去注册</a>';
        el.nicknameGroup.style.display = 'none';
        el.nickname.required = false;
        document.getElementById('switchLink').addEventListener('click', toggleMode);
      }
      el.error.classList.remove('show');
    }

    el.switchLink.addEventListener('click', toggleMode);

    function showError(msg) {
      el.error.textContent = msg;
      el.error.classList.add('show');
    }

    el.form.addEventListener('submit', async function(e) {
      e.preventDefault();
      el.error.classList.remove('show');
      el.btn.disabled = true;
      el.btn.textContent = isRegister ? '注册中...' : '登录中...';

      const email = el.email.value.trim();
      const password = el.password.value;
      const nickname = el.nickname.value.trim();

      try {
        if (isRegister) {
          // 注册
          const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
              data: { nickname: nickname }
            }
          });

          if (error) throw error;

          if (data.user) {
            showError('注册成功！请检查邮箱确认链接（如未收到请检查垃圾箱）。确认后即可登录。');
            toggleMode(); // 切回登录模式
          }
        } else {
          // 登录
          const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (error) throw error;

          if (data.user) {
            window.location.href = 'write.html';
          }
        }
      } catch (err) {
        showError(err.message || '操作失败，请重试');
      } finally {
        el.btn.disabled = false;
        el.btn.textContent = isRegister ? '注册' : '登录';
      }
    });

    // 检查是否已登录 -> 直接跳转
    (async function() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        window.location.href = 'write.html';
      }
    })();
  </script>
</body>
</html>
