<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>柒柒's Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <canvas id="particles"></canvas>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">柒柒<span class="logo-dot">.</span></a>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="blog.html">博客</a>
        <a href="about.html">关于</a>
        <a href="thanks.html">致谢</a>
      </div>
    </div>
  </nav>

  <main class="hero">
    <div class="spotlight" id="spotlight"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="hero-card">
      <div class="avatar-wrapper">
        <div class="avatar">
          <img src="images/avatar.jpg" alt="柒柒">
        </div>
        <div class="avatar-ring"></div>
      </div>

      <h1 class="name">柒柒</h1>
      <p class="tagline">一个不知天高地厚的大学生</p>
      <p class="status-dot"><span class="dot-pulse"></span> 在线，欢迎你来</p>

      <div class="social-links">
        <a href="https://github.com/Simqiqi" target="_blank" title="GitHub" class="social-btn github">
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>
        <a href="javascript:void(0)" title="微信" class="social-btn wechat" onclick="showWechat()">
          <i class="fa-brands fa-weixin"></i>
          <span>微信</span>
        </a>
        <a href="https://weibo.com/u/7878583139" target="_blank" title="微博" class="social-btn weibo">
          <i class="fa-brands fa-weibo"></i>
          <span>微博</span>
        </a>
        <a href="https://x.com/simqiqi2222?s=11" target="_blank" title="X" class="social-btn twitter">
          <i class="fa-brands fa-x-twitter"></i>
          <span>Twitter</span>
        </a>
      </div>

      <p class="hero-quote" id="heroQuote"></p>

      <a href="blog.html" class="cta-btn">
        <span>进入博客</span>
        <i class="fa-solid fa-arrow-right"></i>
      </a>

      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-num">2</span>
          <span class="stat-label">篇文章</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num" id="daysCount">0</span>
          <span class="stat-label">天在线</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-num">2026</span>
          <span class="stat-label">启程</span>
        </div>
      </div>
    </div>

    <div class="scroll-hint">
      <span>往下翻翻</span>
      <i class="fa-solid fa-chevron-down"></i>
    </div>
  </main>

  <section class="recent-posts">
    <h3>最近文章</h3>
    <div class="recent-grid">
      <a href="posts/talk-unfinished.html" class="recent-card">
        <span class="recent-date">2026-07-15</span>
        <span class="recent-title">话没说完，也没关系</span>
      </a>
      <a href="posts/hello-world.html" class="recent-card">
        <span class="recent-date">2026-07-15</span>
        <span class="recent-title">你好，世界</span>
      </a>
    </div>
  </section>

  <section class="interests">
    <h3>感兴趣的事</h3>
    <div class="tag-cloud">
      <span class="tag">独立开发</span>
      <span class="tag">开源</span>
      <span class="tag">写作</span>
      <span class="tag">摄影</span>
      <span class="tag">电影</span>
      <span class="tag">跑步</span>
      <span class="tag">探索 AI</span>
    </div>
  </section>

  <section class="say-hi">
    <div class="say-hi-card">
      <i class="fa-solid fa-paper-plane"></i>
      <h3>来都来了，打个招呼吧</h3>
      <p>GitHub / 微信 / 微博 / Twitter，总有一个能找着我。</p>
      <a href="about.html" class="say-hi-btn">关于我</a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 柒柒. Powered by curiosity.</p>
  </footer>

  <div class="modal-overlay" id="wechatModal" onclick="hideWechat()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="hideWechat()">&times;</button>
      <img src="images/wechat-qr.jpg" alt="微信二维码" class="qr-img">
      <p class="qr-tip">扫二维码，添加我为朋友。</p>
    </div>
  </div>

  <script src="js/main.js"></script>

  <button class="back-to-top" id="backToTop" title="回到顶部">
    <i class="fa-solid fa-arrow-up"></i>
  </button>
</body>
</html>
